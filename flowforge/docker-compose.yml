services:
  client:
    build:
      context: ./client
      # Vite bakes the API URL into the bundle at build time.
      args:
        VITE_API_URL: ${VITE_API_URL}
    ports:
      - "5173:80"
    depends_on:
      - server

  server:
    build: ./server
    ports:
      - "3001:3001"
    volumes:
      - db-data:/app/data
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - DATABASE_PATH=/app/data/flowforge.db
      - AI_SERVICE_URL=http://ai-service:5000
      - PORT=3001
    depends_on:
      - redis
      - ai-service

  ai-service:
    build: ./ai-service
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    # Internal-only: reached by the server over the compose network. Not
    # published to the host (see ai-service/CLAUDE.md).

  redis:
    image: redis:7-alpine
    # Internal-only: Bull job queue + Socket.io pub/sub for the server.

volumes:
  db-data:
