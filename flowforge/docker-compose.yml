services:
  client:
    build:
      context: ./client
      # Vite bakes the API URL into the bundle at build time.
      args:
        VITE_API_URL: ${VITE_API_URL}
    ports:
      - "5173:80"
    depends_on:
      server:
        condition: service_healthy

  server:
    build: ./server
    ports:
      - "3001:3001"
    volumes:
      - db-data:/app/data
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - DATABASE_PATH=/app/data/flowforge.db
      - AI_SERVICE_URL=http://ai-service:5000
      - PORT=3001
    depends_on:
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    # The deep readiness probe exercises SQLite and Redis, so "healthy" here
    # means "actually able to serve and run workflows", not just "listening".
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  ai-service:
    build: ./ai-service
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    # Internal-only: reached by the server over the compose network. Not
    # published to the host.
    # python:slim ships neither curl nor wget — probe with the stdlib.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    # Internal-only: Bull job queue + Socket.io pub/sub for the server.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  db-data:
