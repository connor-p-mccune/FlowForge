name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flowforge/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: flowforge/server/package-lock.json
      - run: npm ci
      - run: npm test

  client-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flowforge/client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: flowforge/client/package-lock.json
      - run: npm ci
      - run: npm run lint

  ai-service-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flowforge/ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v
