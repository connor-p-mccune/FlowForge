server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Single-page app: fall back to index.html for unknown paths so client-side
  # routing (React Router) handles deep links like /workflow/:id.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Fingerprinted build assets can be cached aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
